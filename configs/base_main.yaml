# Main experiment base: ~1B-parameter Llama-style model, 30B tokens/run.
# The run matrix (xscript.runmatrix) stamps `name`, `langs`, `probs`,
# `tok_name`, and any `branch` onto a deep copy of this block per run.
seed: 0
data_seed: 1234
compile: true

model:
  vocab_size: 65536      # uint16-exact; must equal the tokenizer vocab
  dim: 2048
  n_layers: 16
  n_heads: 16
  n_kv_heads: 16         # no GQA at this scale
  ffn_dim: 5632
  max_seq_len: 2048
  rope_theta: 10000.0
  norm_eps: 1.0e-5

optim:
  betas: [0.9, 0.95]
  weight_decay: 0.1
  eps: 1.0e-8
  grad_clip: 1.0

train:
  micro_batch_size: 8            # per-GPU forward batch (windows)
  global_batch_tokens: 1.0e6     # ~0.5M-1M tokens/optimizer step
  log_every: 20
  eval_docs: 500                 # holdout docs per language for in-loop BPB
  ckpt_schedule:                 # [up_to_tokens, interval] -> log-spaced
    - [2.0e9, 2.5e8]
    - [5.0e9, 5.0e8]
    - [15.0e9, 1.0e9]
    - [1.0e15, 2.0e9]

# Self-contained WSD to 30B (warmup + stable + decay). The matrix overrides
# stable/decay for trunk and cooldown-branch variants.
schedule:
  peak_lr: 3.0e-3
  min_lr: 3.0e-4
  warmup_tokens: 1.0e9
  stable_tokens: 23.0e9
  decay_tokens: 6.0e9
  decay_shape: 1-sqrt
