# Tiny CPU smoke config: validates the whole pipeline (loader -> model ->
# schedule -> eval) end to end in seconds. NOT for real training.
seed: 0
data_seed: 1234
compile: false

model:
  vocab_size: 8192       # smoke tokenizers emit few ids; small head keeps CPU fast
  dim: 64
  n_layers: 2
  n_heads: 4
  n_kv_heads: 4
  ffn_dim: 128
  max_seq_len: 64
  rope_theta: 10000.0
  norm_eps: 1.0e-5

optim:
  betas: [0.9, 0.95]
  weight_decay: 0.1
  eps: 1.0e-8
  grad_clip: 1.0

train:
  micro_batch_size: 4
  global_batch_tokens: 2048
  log_every: 5
  eval_docs: 20
  ckpt_schedule:
    - [1.0e15, 20000]

schedule:
  peak_lr: 3.0e-3
  min_lr: 3.0e-4
  warmup_tokens: 4000
  stable_tokens: 20000
  decay_tokens: 8000
  decay_shape: 1-sqrt
